# yagent keymap — agent actions layered onto yazi's manager.
# Loaded by the isolated profile that `bin/yagent` launches. prepend_keymap so
# these take priority without clobbering yazi's defaults.

[[mgr.prepend_keymap]]
on  = "N"
run = "plugin devin-agent -- new"
desc = "yagent: new agent on the hovered folder"

[[mgr.prepend_keymap]]
on  = "a"
run = "plugin devin-agent -- attach"
desc = "yagent: attach to the agent on the hovered folder"

[[mgr.prepend_keymap]]
on  = "s"
run = "plugin devin-agent -- send"
desc = "yagent: send a prompt to the running agent"

[[mgr.prepend_keymap]]
on  = "K"
run = "plugin devin-agent -- kill"
desc = "yagent: kill the agent (confirm)"

[[mgr.prepend_keymap]]
on  = "r"
run = "plugin devin-agent -- refresh"
desc = "yagent: refresh agent state"

[[mgr.prepend_keymap]]
on  = ["g", "a"]
run = "plugin devin-agent -- overview"
desc = "yagent: agents overview (sorted by needs-you)"
