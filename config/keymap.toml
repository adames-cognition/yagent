# yagent keymap — agent actions layered onto yazi's manager.
# Merged into your ~/.config/yazi/keymap.toml by install.sh (prepend_keymap so
# these take priority without clobbering your existing bindings).

[[mgr.prepend_keymap]]
on  = "N"
run = "plugin devin-agent -- new"
desc = "yagent: new agent on the hovered folder"

[[mgr.prepend_keymap]]
on  = "a"
run = "plugin devin-agent -- attach"
desc = "yagent: attach to the selected agent"

[[mgr.prepend_keymap]]
on  = "s"
run = "plugin devin-agent -- send"
desc = "yagent: send a prompt to the running agent"

[[mgr.prepend_keymap]]
on  = "K"
run = "plugin devin-agent -- kill"
desc = "yagent: kill the agent (confirm)"

[[mgr.prepend_keymap]]
on  = "<Tab>"
run = "plugin devin-agent -- focus"
desc = "yagent: enter/leave the agent axis"

[[mgr.prepend_keymap]]
on  = ["g", "a"]
run = "plugin devin-agent -- overview"
desc = "yagent: agents overview (sorted by needs-you)"

[[mgr.prepend_keymap]]
on  = "I"
run = "plugin devin-agent -- new-isolated"
desc = "yagent: new isolated agent (worktree + sandbox) [v0.3]"
